<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>FAMANA — Admin</title>
<style>
  :root {
    --bg: #0f1216; --panel: #171c22; --panel-2: #1e242c; --line: #2a323c;
    --text: #e6edf3; --muted: #8b98a5; --accent: #4f9dff; --accent-d: #2f7de0;
    --danger: #ff5d5d; --danger-d: #d13c3c; --ok: #45c46a; --chip: #243040;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--text); border-radius: 6px;
    padding: 6px 12px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent-d); border-color: var(--accent-d); }
  button.primary:hover { background: var(--accent); }
  button.danger { background: var(--danger-d); border-color: var(--danger-d); }
  button.danger:hover { background: var(--danger); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  input, select {
    font: inherit; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 9px;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  header.topbar {
    display: flex; align-items: center; gap: 20px; padding: 12px 22px;
    background: var(--panel); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 5;
  }
  header .brand { font-weight: 700; letter-spacing: .5px; }
  header nav { display: flex; gap: 16px; }
  header .spacer { flex: 1; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px 22px 80px; }
  h1 { font-size: 22px; margin: 0 0 18px; }
  h2 { font-size: 16px; margin: 26px 0 12px; color: var(--muted); font-weight: 600;
       text-transform: uppercase; letter-spacing: .6px; }
  .muted { color: var(--muted); }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; }
  .card .n { font-size: 30px; font-weight: 700; }
  .card .k { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--chip); border-radius: 20px; padding: 4px 12px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  tbody tr:hover { background: var(--panel); }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .grow { flex: 1; }
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .invgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; }
  .slot { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; overflow: hidden; }
  .slot .name { font-weight: 600; }
  .slot .meta { color: var(--muted); font-size: 12px; margin: 2px 0 8px; word-break: break-all; }
  .slot .qty { font-size: 20px; font-weight: 700; margin: 4px 0 8px; }
  .slot .ctrls { display: flex; gap: 6px; align-items: center; }
  .slot .ctrls button { flex: 0 0 auto; width: 32px; padding: 4px 0; text-align: center; }
  .slot .ctrls input { flex: 1 1 auto; width: 100%; min-width: 0; text-align: center; }
  .kv { display: grid; grid-template-columns: 130px 1fr; gap: 6px 14px; align-items: center; }
  .kv label { color: var(--muted); }
  .danger-zone { border-color: var(--danger-d); }
  .danger-zone h2 { color: var(--danger); }
  .pager { display: flex; gap: 10px; align-items: center; justify-content: flex-end; margin-top: 14px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 18px; z-index: 50; box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  .toast.err { border-color: var(--danger); }
  .toast.ok { border-color: var(--ok); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
    align-items: center; justify-content: center; z-index: 40; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 24px; width: min(440px, 92vw); }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 32px; width: min(360px, 92vw); }
  .login-box h1 { text-align: center; }
  .badge { font-size: 12px; padding: 2px 8px; border-radius: 6px; background: var(--chip); }
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

// ---- tiny helpers ----------------------------------------------------------
const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, props = {}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined) n.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null || kid === false) continue;
    n.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return n;
};
const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const fmtDate = (s) => s ? new Date(s).toLocaleString() : "—";

let toastTimer;
function toast(msg, kind = "") {
  clearTimeout(toastTimer);
  const old = $(".toast"); if (old) old.remove();
  const t = el("div", { class: "toast " + kind }, msg);
  document.body.append(t);
  toastTimer = setTimeout(() => t.remove(), 3200);
}

// ---- API -------------------------------------------------------------------
async function api(method, path, body) {
  const opts = { method, headers: {}, credentials: "same-origin" };
  if (body !== undefined) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (res.status === 401) { location.hash = "#/login"; throw new Error("unauthorized"); }
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok) {
    const err = new Error((data && data.error) || res.statusText);
    err.status = res.status; err.data = data;
    throw err;
  }
  return data;
}

// ---- catalog cache ---------------------------------------------------------
let ITEMS = null;
async function items() {
  if (!ITEMS) ITEMS = (await api("GET", "/admin/items")).items;
  return ITEMS;
}
function itemName(id) { const it = (ITEMS || []).find((x) => x.id === id); return it ? it.name : id; }

// ---- layout ----------------------------------------------------------------
function chrome(active, contentNode) {
  const app = $("#app");
  app.innerHTML = "";
  app.append(
    el("header", { class: "topbar" },
      el("span", { class: "brand" }, "FAMANA · Admin"),
      el("nav", {},
        el("a", { href: "#/", style: active === "dash" ? "color:var(--text)" : "" }, "Dashboard"),
        el("a", { href: "#/players", style: active === "players" ? "color:var(--text)" : "" }, "Players"),
      ),
      el("span", { class: "spacer" }),
      el("button", { onclick: logout }, "Log out"),
    ),
    el("main", {}, contentNode),
  );
}
async function logout() {
  try { await api("POST", "/admin/logout"); } catch {}
  location.hash = "#/login";
}

function loading() { return el("p", { class: "muted" }, "Loading…"); }

// ---- login -----------------------------------------------------------------
function viewLogin() {
  const app = $("#app");
  app.innerHTML = "";
  const pw = el("input", { type: "password", placeholder: "Admin password", style: "width:100%" });
  const submit = async () => {
    try {
      await api("POST", "/admin/login", { password: pw.value });
      location.hash = "#/";
    } catch (e) {
      if (e.status === 429) toast("Too many attempts — wait a bit.", "err");
      else if (e.status === 503) toast("Admin panel is disabled (ADMIN_PASSWORD unset).", "err");
      else toast("Invalid password.", "err");
    }
  };
  pw.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
  app.append(el("div", { class: "login-wrap" },
    el("div", { class: "login-box" },
      el("h1", {}, "FAMANA Admin"),
      el("div", { style: "margin:16px 0" }, pw),
      el("button", { class: "primary", style: "width:100%", onclick: submit }, "Log in"),
    )));
  setTimeout(() => pw.focus(), 30);
}

// ---- dashboard -------------------------------------------------------------
async function viewDashboard() {
  chrome("dash", loading());
  let stats, recent;
  try {
    [stats] = await Promise.all([api("GET", "/admin/stats"), items()]);
    recent = await api("GET", "/admin/players?sort=updated_at:desc&limit=8");
  } catch { return; }

  const cellChips = Object.entries(stats.players.byCell)
    .map(([c, n]) => el("span", { class: "chip" }, `Cell ${c}: ${n}`));
  const itemChips = Object.entries(stats.items)
    .map(([id, n]) => el("span", { class: "chip" }, `${itemName(id)}: ${n}`));

  const card = (n, k) => el("div", { class: "card" }, el("div", { class: "n" }, n), el("div", { class: "k" }, k));

  const content = el("div", {},
    el("h1", {}, "Dashboard"),
    el("div", { class: "cards" },
      card(stats.players.total, "Total players"),
      card(stats.activity.activeLast24h, "Active (24h)"),
      card(stats.activity.newLast7d, "New (7d)"),
      card(Object.keys(stats.players.byCell).length, "Cells in use"),
    ),
    el("h2", {}, "Players per cell"),
    el("div", { class: "chips" }, cellChips.length ? cellChips : el("span", { class: "muted" }, "No players yet")),
    el("h2", {}, "Item totals"),
    el("div", { class: "chips" }, itemChips.length ? itemChips : el("span", { class: "muted" }, "None")),
    el("h2", {}, "Recently active"),
    playersTable(recent.players, false),
  );
  chrome("dash", content);
}

// ---- players list ----------------------------------------------------------
const listState = { query: "", cell: "", sort: "updated_at:desc", limit: 25, offset: 0 };

function playersTable(rows, sortable) {
  const th = (label, col) => el("th", sortable ? {
    onclick: () => { toggleSort(col); },
  } : {}, label + (sortable && listState.sort.startsWith(col + ":")
    ? (listState.sort.endsWith("asc") ? " ▲" : " ▼") : ""));
  const body = el("tbody", {},
    ...(rows.length ? rows.map((p) => el("tr", {},
      el("td", {}, el("a", { href: `#/players/${p.id}` }, p.username || "(unknown)")),
      el("td", { class: "muted" }, p.id),
      el("td", {}, el("span", { class: "badge" }, p.cell)),
      el("td", {}, `${p.health}/${p.maxHealth}`),
      el("td", { class: "muted" }, fmtDate(p.updatedAt)),
    )) : [el("tr", {}, el("td", { colspan: "5", class: "muted" }, "No players found."))]));
  return el("table", {},
    el("thead", {}, el("tr", {},
      th("Username", "username"), th("ID", "id"), th("Cell", "cell"),
      th("HP", "health"), th("Updated", "updated_at"))),
    body);
}

function toggleSort(col) {
  const [c, d] = listState.sort.split(":");
  listState.sort = c === col ? `${col}:${d === "asc" ? "desc" : "asc"}` : `${col}:asc`;
  listState.offset = 0;
  viewPlayers();
}

async function viewPlayers() {
  chrome("players", loading());
  await items().catch(() => {});
  const qs = new URLSearchParams({
    query: listState.query, cell: listState.cell, sort: listState.sort,
    limit: listState.limit, offset: listState.offset,
  });
  let data;
  try { data = await api("GET", "/admin/players?" + qs); } catch { return; }

  const search = el("input", { placeholder: "Search username or id…", value: listState.query, style: "min-width:240px" });
  search.addEventListener("keydown", (e) => { if (e.key === "Enter") { listState.query = search.value.trim(); listState.offset = 0; viewPlayers(); } });
  const cell = el("input", { placeholder: "Cell (e.g. A)", value: listState.cell, style: "width:110px" });
  cell.addEventListener("keydown", (e) => { if (e.key === "Enter") { listState.cell = cell.value.trim(); listState.offset = 0; viewPlayers(); } });

  const from = data.total ? data.offset + 1 : 0;
  const to = Math.min(data.offset + data.limit, data.total);

  const content = el("div", {},
    el("h1", {}, "Players"),
    el("div", { class: "toolbar" },
      search, cell,
      el("button", { class: "primary", onclick: () => { listState.query = search.value.trim(); listState.cell = cell.value.trim(); listState.offset = 0; viewPlayers(); } }, "Search"),
      el("span", { class: "grow" }),
      el("span", { class: "muted" }, `${from}–${to} of ${data.total}`),
    ),
    el("div", { class: "panel", style: "padding:0 4px" }, playersTable(data.players, true)),
    el("div", { class: "pager" },
      el("button", { disabled: data.offset <= 0, onclick: () => { listState.offset = Math.max(0, data.offset - data.limit); viewPlayers(); } }, "‹ Prev"),
      el("button", { disabled: to >= data.total, onclick: () => { listState.offset = data.offset + data.limit; viewPlayers(); } }, "Next ›"),
    ),
  );
  chrome("players", content);
}

// ---- player detail ---------------------------------------------------------
async function viewPlayer(id) {
  chrome("players", loading());
  let p;
  try { [p] = await Promise.all([api("GET", `/admin/players/${id}`), items()]); }
  catch (e) {
    if (e.status === 404) { chrome("players", el("div", {}, el("h1", {}, "Not found"), el("a", { href: "#/players" }, "← Back to players"))); return; }
    return;
  }

  const refresh = () => viewPlayer(id);

  // --- editable stats ---
  const hp = el("input", { type: "number", value: p.health, style: "width:90px" });
  const maxHp = el("input", { type: "number", value: p.maxHealth, style: "width:90px" });
  const cellIn = el("input", { value: p.cell, style: "width:90px" });
  const px = el("input", { type: "number", step: "0.1", value: p.position.x, style: "width:90px" });
  const py = el("input", { type: "number", step: "0.1", value: p.position.y, style: "width:90px" });
  const pz = el("input", { type: "number", step: "0.1", value: p.position.z, style: "width:90px" });

  const saveStats = async () => {
    try {
      await api("PATCH", `/admin/players/${id}`, {
        health: Number(hp.value), maxHealth: Number(maxHp.value), cell: cellIn.value.trim(),
        position: { x: Number(px.value), y: Number(py.value), z: Number(pz.value) },
      });
      toast("Saved. Applies to the player on their next login.", "ok");
      refresh();
    } catch (e) { toast("Save failed: " + (e.data && e.data.field ? "bad " + e.data.field : e.message), "err"); }
  };

  // --- inventory (re-renders in place so +/- doesn't reload the whole page) ---
  const invPanel = el("div", { class: "panel" });
  async function reloadInventory() {
    try { const fresh = await api("GET", `/admin/players/${id}`); renderInventory(fresh.inventory); }
    catch (e) { if (e.message !== "unauthorized") toast("Reload failed: " + e.message, "err"); }
  }
  function renderInventory(inv) {
    const slots = inv.length ? inv.map((slot) => {
      const qty = el("input", { type: "number", value: 1, min: 1 });
      return el("div", { class: "slot" },
        el("div", { class: "name" }, itemName(slot.itemId)),
        el("div", { class: "meta" }, `slot ${slot.slotIndex} · ${slot.itemId}`),
        el("div", { class: "qty" }, "×" + slot.quantity),
        el("div", { class: "ctrls" },
          el("button", { title: "Remove", onclick: () => changeItem(id, slot.itemId, Number(qty.value), "remove", reloadInventory) }, "−"),
          qty,
          el("button", { title: "Add", onclick: () => changeItem(id, slot.itemId, Number(qty.value), "add", reloadInventory) }, "＋"),
        ));
    }) : [el("p", { class: "muted" }, "Empty inventory.")];
    const picker = el("select", { style: "min-width:200px" }, ...(ITEMS || []).map((it) => el("option", { value: it.id }, `${it.name} (${it.id})`)));
    const addQty = el("input", { type: "number", value: 1, min: 1, style: "width:70px" });
    invPanel.innerHTML = "";
    invPanel.append(
      el("h2", {}, "Inventory"),
      el("div", { class: "invgrid" }, ...slots),
      el("div", { class: "row", style: "margin-top:16px" },
        picker, addQty,
        el("button", { class: "primary", onclick: () => changeItem(id, picker.value, Number(addQty.value), "add", reloadInventory) }, "Add item"),
      ),
    );
  }
  renderInventory(p.inventory);

  // --- danger zone ---
  const dangerZone = el("div", { class: "panel danger-zone" },
    el("h2", {}, "Danger zone"),
    el("div", { class: "row" },
      el("button", { onclick: async () => {
        try { await api("PATCH", `/admin/players/${id}`, { health: Number(maxHp.value) }); hp.value = maxHp.value; toast("HP reset to max.", "ok"); }
        catch (e) { toast("Failed: " + e.message, "err"); }
      } }, "Reset HP to max"),
      el("button", { class: "danger", onclick: () => confirmDelete(id, p.username) }, "Delete player…"),
    ));

  const content = el("div", {},
    el("div", { class: "row", style: "justify-content:space-between" },
      el("h1", { style: "margin:0" }, p.username || "(unknown)"),
      el("a", { href: "#/players" }, "← Back to players")),
    el("p", { class: "muted", style: "margin-top:4px" }, `ID ${p.id} · created ${fmtDate(p.createdAt)} · updated ${fmtDate(p.updatedAt)}`),

    el("div", { class: "panel" },
      el("h2", {}, "Stats"),
      el("div", { class: "kv" },
        el("label", {}, "Health"), el("div", { class: "row" }, hp, el("span", { class: "muted" }, "/"), maxHp),
        el("label", {}, "Cell"), cellIn,
        el("label", {}, "Position"), el("div", { class: "row" }, "x", px, "y", py, "z", pz),
      ),
      el("div", { style: "margin-top:14px" }, el("button", { class: "primary", onclick: saveStats }, "Save stats")),
    ),

    invPanel,

    dangerZone,
  );
  chrome("players", content);
}

async function changeItem(id, itemId, quantity, dir, refresh) {
  if (!Number.isInteger(quantity) || quantity <= 0) { toast("Quantity must be a positive integer.", "err"); return; }
  try {
    if (dir === "add") await api("POST", `/admin/players/${id}/items`, { itemId, quantity });
    else await api("DELETE", `/admin/players/${id}/items`, { itemId, quantity });
    toast(dir === "add" ? "Item added." : "Item removed.", "ok");
    refresh();
  } catch (e) {
    const map = { no_room: "No inventory room.", insufficient: "Player doesn't have that many.", unknown_item: "Unknown item." };
    toast(map[e.data && e.data.error] || ("Failed: " + e.message), "err");
  }
}

function confirmDelete(id, username) {
  const input = el("input", { placeholder: "Type the username to confirm", style: "width:100%" });
  const bg = el("div", { class: "modal-bg", onclick: (e) => { if (e.target === bg) bg.remove(); } },
    el("div", { class: "modal" },
      el("h2", { style: "color:var(--danger);margin-top:0" }, "Delete player"),
      el("p", {}, `This permanently deletes `, el("strong", {}, username || id), ` and all their inventory. This cannot be undone.`),
      el("div", { style: "margin:14px 0" }, input),
      el("div", { class: "row", style: "justify-content:flex-end" },
        el("button", { onclick: () => bg.remove() }, "Cancel"),
        el("button", { class: "danger", onclick: async () => {
          if (input.value !== (username || String(id))) { toast("Name doesn't match.", "err"); return; }
          try { await api("DELETE", `/admin/players/${id}`); bg.remove(); toast("Player deleted.", "ok"); location.hash = "#/players"; }
          catch (e) { toast("Delete failed: " + e.message, "err"); }
        } }, "Delete permanently"),
      )));
  document.body.append(bg);
  setTimeout(() => input.focus(), 30);
}

// ---- router ----------------------------------------------------------------
async function route() {
  const h = location.hash || "#/";
  const parts = h.replace(/^#\//, "").split("/").filter(Boolean);
  try {
    if (h === "#/login") return viewLogin();
    if (parts[0] === "players" && parts[1]) return viewPlayer(parts[1]);
    if (parts[0] === "players") return viewPlayers();
    return viewDashboard();
  } catch (e) {
    if (e.message !== "unauthorized") toast("Error: " + e.message, "err");
  }
}
window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
